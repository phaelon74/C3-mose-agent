[llm]
# LLM settings are supplied via environment variables (not this file):
# LLM_ENDPOINT, LLM_MODEL, LLM_MAX_TOKENS, LLM_TEMPERATURE,
# LLM_OMIT_TEMPERATURE, LLM_CONTEXT_WINDOW, LLM_API_KEY, LLM_PROVIDER.
# Defaults when unset are defined in mose/config.py (LLMConfig).

[discord]
# token loaded from DISCORD_TOKEN env var

[signal]
# phone_number: linked account (SIGNAL_PHONE) — signal-cli -a; not a chat destination.
# engagement_group_id / admin_group_id: base64 group ids (SIGNAL_ENGAGEMENT_GROUP_ID,
# SIGNAL_ADMIN_GROUP_ID). See INSTALL.md section E.  Daemon is Docker Bridge.
daemon_host = "172.17.0.1"
daemon_port = 7583
proposal_timeout_seconds = 43200   # 12 hours

[memory]
db_path = "data/memory.db"
embedding_model = "nomic-ai/nomic-embed-text-v1.5"
embedding_dimensions = 384
top_k = 10
chunk_size = 500
summary_interval = 8
rrf_k = 60
importance_threshold = 3.0
recency_weight = 0.3

[agent]
workspace = "data/workspace"
allow_read_outside = true
skills_path = "skills"
recent_messages_limit = 15
# Merge MCP tool schemas into the main LLM tool list (main agent only). See INSTALL.md §D.
inline_mcp_tools = true
# Restrict inlining to named MCP servers only, e.g. ["plex-ops-admin", "plex-stack-automation"].
# inline_mcp_servers = []
inline_mcp_tools_soft_cap = 80

[terminal]
# "local" for dev; "docker" when agent container uses docker.sock to exec into mose-sandbox
backend = "local"
container = "mose-sandbox"
workspace_mount = "/workspace"

[learning]
# The agent NEVER auto-builds a skill. A proposal is drafted and a human must
# approve via Signal (or the CLI) before the skill body is generated.
enabled = true
pending_dir = "skills/pending"
rejected_dir = "skills/rejected"
approval_required = true       # kept for compatibility, always enforced
min_tools_used = 3             # only propose after this many native tool calls
skill_loading_mode = "full"    # full | level_0 (index-only for token thrift)
# Periodic skill-quality review (writes Markdown report + structured log events)
skill_review_failure_threshold = 0.3
review_interval_hours = 168     # 1 week
review_min_samples = 5          # require at least N uses before flagging
review_log_dir = "data/logs"
review_startup_delay_seconds = 300
# Startup grace window for approved-but-unbuilt skills (crashed mid-draft).
# The admin is notified and the build auto-starts after this delay unless
# they reply "stop <slug>" or "cancel <slug>". Default: 15 minutes.
build_grace_window_seconds = 900

[observe]
log_dir = "data/logs"
log_level = "INFO"
web_dashboard = false
web_port = 8900
