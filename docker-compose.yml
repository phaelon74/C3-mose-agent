# Mose agent + isolated shell sandbox, for a Linux Docker host.
#
# Prerequisites on the host:
#   - Docker Engine >= 24
#   - The deploying user is in the `docker` group
#   - Build-time:  DOCKER_GID=$(getent group docker | cut -d: -f3)
#   - Runtime:     LLM_ENDPOINT points at a local OpenAI-compatible server
#                  (TabbyAPI, vLLM, llama.cpp server, ...)
#
# Bring up (agent + sandbox + optional Plex + arr MCP sidecars; see INSTALL.md D):
#   export DOCKER_GID=$(getent group docker | cut -d: -f3)
#   docker compose build mose-sandbox mose-agent plex-ops-admin plex-stack-automation sonarr-diagnostics radarr-diagnostics
#   docker compose up -d mose-sandbox mose-agent plex-ops-admin plex-stack-automation sonarr-diagnostics radarr-diagnostics
#
# Periodic skill review (run from a systemd timer on the host):
#   docker compose run --rm mose-skill-review

services:
  # Isolated shell target. The agent `exec`s into this container instead of
  # running shell commands directly inside its own container.
  mose-sandbox:
    build:
      context: .
      dockerfile: docker/sandbox/Dockerfile
    container_name: mose-sandbox
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    networks:
      - mose-net
    volumes:
      - mose-workspace:/workspace
    healthcheck:
      test: ["CMD", "bash", "-lc", "test -d /workspace"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # Plex MCP (vladimir-tutin) — idle container; mose-agent stdio-bridge via docker exec.
  plex-ops-admin:
    build:
      context: .
      dockerfile: docker/plex-mcp-ops-admin/Dockerfile
    container_name: mose-plex-ops-admin
    networks:
      - mose-net
    environment:
      PLEX_URL: ${PLEX_URL:-}
      PLEX_TOKEN: ${PLEX_TOKEN:-}
    restart: unless-stopped

  # Plex + Sonarr + Radarr MCP (niavasha) — idle container; docker exec stdio bridge.
  plex-stack-automation:
    build:
      context: .
      dockerfile: docker/plex-mcp-stack-automation/Dockerfile
    container_name: mose-plex-stack-automation
    networks:
      - mose-net
    environment:
      PLEX_URL: ${PLEX_URL:-}
      PLEX_TOKEN: ${PLEX_TOKEN:-}
      SONARR_URL: ${SONARR_URL:-}
      SONARR_API_KEY: ${SONARR_API_KEY:-}
      RADARR_URL: ${RADARR_URL:-}
      RADARR_API_KEY: ${RADARR_API_KEY:-}
      TRAKT_CLIENT_ID: ${TRAKT_CLIENT_ID:-}
      TRAKT_CLIENT_SECRET: ${TRAKT_CLIENT_SECRET:-}
      # Defense in depth: Mose classifies mutating tools via mose/mcp_write_policy
      # and requires Signal admin approval. Leave upstream mutative ops OFF so a
      # tool that bypasses use_tool can never appear on the wire.
      PLEX_ENABLE_MUTATIVE_OPS: "false"
    restart: unless-stopped

  # Sonarr diagnostics MCP — Python *arr API tools (queue/import/logs/commands).
  # Same image as radarr-diagnostics; env selects Sonarr only.
  sonarr-diagnostics:
    build:
      context: .
      dockerfile: docker/arr-diagnostics/Dockerfile
    image: mose-arr-diagnostics:latest
    container_name: mose-sonarr-diagnostics
    networks:
      - mose-net
    environment:
      SONARR_URL: ${SONARR_URL:-}
      SONARR_API_KEY: ${SONARR_API_KEY:-}
    restart: unless-stopped

  radarr-diagnostics:
    image: mose-arr-diagnostics:latest
    build:
      context: .
      dockerfile: docker/arr-diagnostics/Dockerfile
    container_name: mose-radarr-diagnostics
    networks:
      - mose-net
    environment:
      RADARR_URL: ${RADARR_URL:-}
      RADARR_API_KEY: ${RADARR_API_KEY:-}
    restart: unless-stopped

  # Main agent. Runs as the non-root `mose` user inside the image.
  mose-agent:
    build:
      context: .
      args:
        DOCKER_GID: ${DOCKER_GID:-999}
    container_name: mose-agent
    depends_on:
      mose-sandbox:
        condition: service_healthy
      # MCP stdio bridges: containers must exist BEFORE mose-agent calls
      # `docker exec -i` during MCP init. Comment both out if you do not want
      # the Plex sidecars.
      plex-ops-admin:
        condition: service_started
      plex-stack-automation:
        condition: service_started
      sonarr-diagnostics:
        condition: service_started
      radarr-diagnostics:
        condition: service_started
    environment:
      TERMINAL_BACKEND: docker
      LLM_ENDPOINT: ${LLM_ENDPOINT:-http://host.docker.internal:5000/v1}
      LLM_MODEL: ${LLM_MODEL:-model}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-}
      LLM_OMIT_TEMPERATURE: ${LLM_OMIT_TEMPERATURE:-}
      LLM_CONTEXT_WINDOW: ${LLM_CONTEXT_WINDOW:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      SIGNAL_PHONE: ${SIGNAL_PHONE:-}
      SIGNAL_ENGAGEMENT_GROUP_ID: ${SIGNAL_ENGAGEMENT_GROUP_ID:-}
      SIGNAL_ADMIN_GROUP_ID: ${SIGNAL_ADMIN_GROUP_ID:-}
    # extra_hosts maps host.docker.internal on Linux (native on macOS/Windows).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - mose-data:/app/data
      - mose-workspace:/app/data/workspace
      # Approved skills, pending proposals, and rejections (see INSTALL.md A.5.4).
      - mose-skills:/app/skills
      # Required for TERMINAL_BACKEND=docker so mose-agent can `docker exec`
      # into mose-sandbox. The `mose` user is added to the `docker` group at
      # build time; for tighter deployments front the socket with a proxy.
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mose-net
    restart: unless-stopped

  # One-shot service: run a skill-quality review and exit. Invoked from a
  # systemd timer on the host (see ops/systemd/mose-skill-review.*).
  mose-skill-review:
    build:
      context: .
      args:
        DOCKER_GID: ${DOCKER_GID:-999}
    profiles: ["review"]
    depends_on:
      mose-sandbox:
        condition: service_healthy
    environment:
      TERMINAL_BACKEND: docker
      LLM_ENDPOINT: ${LLM_ENDPOINT:-http://host.docker.internal:5000/v1}
      LLM_MODEL: ${LLM_MODEL:-model}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-}
      LLM_OMIT_TEMPERATURE: ${LLM_OMIT_TEMPERATURE:-}
      LLM_CONTEXT_WINDOW: ${LLM_CONTEXT_WINDOW:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      SIGNAL_PHONE: ${SIGNAL_PHONE:-}
      SIGNAL_ENGAGEMENT_GROUP_ID: ${SIGNAL_ENGAGEMENT_GROUP_ID:-}
      SIGNAL_ADMIN_GROUP_ID: ${SIGNAL_ADMIN_GROUP_ID:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - mose-data:/app/data
      - mose-workspace:/app/data/workspace
      - mose-skills:/app/skills
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - mose-net
    command: ["python", "-m", "mose", "--skill-review"]

networks:
  mose-net:
    driver: bridge

volumes:
  mose-data:
  mose-workspace:
  mose-skills:
