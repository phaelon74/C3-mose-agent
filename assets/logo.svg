<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="moonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8e0d4"/>
      <stop offset="100%" style="stop-color:#c9bfb0"/>
    </linearGradient>
    <radialGradient id="shadow" cx="40%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#d4ccc0;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#a89e90;stop-opacity:0.3"/>
    </radialGradient>
  </defs>
  <!-- dark sky circle background -->
  <circle cx="60" cy="60" r="58" fill="#0d1117"/>
  <circle cx="60" cy="60" r="58" fill="none" stroke="#21262d" stroke-width="1.5"/>
  <!-- crescent moon: main circle minus offset circle -->
  <clipPath id="crescent">
    <rect x="0" y="0" width="120" height="120"/>
  </clipPath>
  <circle cx="56" cy="58" r="30" fill="url(#moonGlow)"/>
  <circle cx="56" cy="58" r="30" fill="url(#shadow)"/>
  <circle cx="72" cy="48" r="26" fill="#0d1117"/>
  <!-- small stars -->
  <circle cx="88" cy="78" r="1.5" fill="#8b949e" opacity="0.8"/>
  <circle cx="30" cy="30" r="1" fill="#8b949e" opacity="0.6"/>
  <circle cx="92" cy="35" r="1.2" fill="#8b949e" opacity="0.7"/>
  <circle cx="22" cy="85" r="1" fill="#8b949e" opacity="0.5"/>
  <circle cx="78" cy="22" r="0.8" fill="#8b949e" opacity="0.4"/>
</svg>
